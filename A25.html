<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
         .a {
            /* border : 1px solid; */
             width : 300px;
             padding : 10px;
             box-shadow : 0px 0px 10px #444;
             text-align : center;
      }
    </style>
</head>
<body>
    <div id="root" style="display:flex; justify-content:space-evenly"></div>

    <script type="text/babel">
        //Dynamic values
        const arr = [
                      {
                        name : "Doraemon", info : "GLOBAL", pic : "doraemon.png"
                      },
                      {
                        name : "Nobita", info : "JEC", pic : "nobita.jpg"
                      }, 
                      {
                        name : "Raju", info : "GGITS", pic : "raju.jpg"
                    }];
        function record(obj) {
            return (
                    <div class="a">
                        <img src={obj.pic} height="75%" />
                        <h1>{obj.name}</h1>
                        <p>{obj.info}</p>
                    </div>
                   );
        }

         ReactDOM.render([record(arr[0]), record(arr[1]), record(arr[2])] ,document.querySelector('#root'));
    </script>
</body>
</html>
