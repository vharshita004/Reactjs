<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const p = document.createElement('p');
        
        p.id = 'a';
        
        p.innerText = "Some more text";
        
        const body = document.querySelector('body');

        body.append(p);
    </script>
</body>
</html>
